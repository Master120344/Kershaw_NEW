<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - The Kershaw Law Firm P.C.</title>
    <meta name="description" content="Sign in to your Kershaw Law Firm client account.">
    <link rel="stylesheet" href="index_mobile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body style="padding-bottom: 0;">

    <div class="back-bar">
        <a href="index_mobile.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> <span>Back</span>
        </a>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-branding">
                <h1>The Kershaw Law Firm P.C.</h1>
                <p id="auth-title">Sign in to your account</p>
            </div>

            <form class="login-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required minlength="6">
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="button" class="forgot-link" id="forgot-link">Forgot password?</button>

                <button type="submit" class="cta-button login-submit" id="auth-submit-btn">Sign In</button>
            </form>

            <div class="login-toggle">
                <span>Don't have an account? </span><button id="auth-toggle-btn">Sign Up</button>
            </div>
        </div>
    </div>

    <script src="index_mobile.js" defer></script>
</body>
</html>
